name: Release

# Triggered by version tags pushed by `make release`.
# npm is published locally by make release (like cargo release in gitprint).
# CI only needs to verify the build and push the versioned Docker image.
# The GitHub release is also created locally by make release — no secrets needed here.

on:
  push:
    tags: ['v*']

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      - run: npm test
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0

  # ── GitHub release ────────────────────────────────────────────────────────
  # make release creates the GitHub release locally with proper changelog notes.
  # This job is a race-condition fallback: if make release already created it,
  # the create call fails silently (|| true) and we move on.
  github-release:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release (if not already created by make release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || true

  # ── Docker versioned image ─────────────────────────────────────────────────
  publish-docker:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
