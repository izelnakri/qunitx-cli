name: Release

# Triggered by version tags (e.g. v0.2.0). Runs tests, then publishes to npm,
# pushes a versioned Docker image, and creates a GitHub release with changelog.

on:
  push:
    tags: ['v*']

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
      - run: npm ci
      - run: npm test
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          CHROME_BIN: /usr/bin/google-chrome-stable
          FORCE_COLOR: 0

  # ── Publish to npm ─────────────────────────────────────────────────────────────
  # `prepack` runs `npm run build` automatically before packing.
  publish-npm:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Docker versioned image ──────────────────────────────────────────────────────
  publish-docker:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub release ─────────────────────────────────────────────────────────────
  # Creates a GitHub release with auto-generated changelog notes.
  github-release:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate changelog
        run: npm run changelog:unreleased > RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md
