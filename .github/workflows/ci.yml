name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Surfaces formatting failures fast, independent of the slower test job.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Test ──────────────────────────────────────────────────────────────────────
  # Runs in parallel with lint. Test files run concurrently (4-way) — safe
  # because each CLI invocation gets a unique --output dir and the port resolver
  # now correctly syncs config.port after collision retries.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
      - run: npm ci
      - run: npm test
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          CHROME_BIN: /usr/bin/google-chrome-stable
          FORCE_COLOR: 0

  # ── Docker nightly ─────────────────────────────────────────────────────────────
  # Builds and pushes a `nightly` image to GHCR on every successful main-branch
  # push. PRs only build (no push) so the image cache stays warm for main.
  docker-nightly:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
