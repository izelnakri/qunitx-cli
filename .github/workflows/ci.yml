name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel stale in-progress runs when a PR is pushed again. Main-branch runs are
# preserved (they may produce releases, update caches, or deploy Pages), so the
# cancel is gated on event_name == pull_request. The group key includes ref so
# unrelated PRs don't compete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# `if: !DUPLICATE_PR_EVENT` (inlined per job below): same-repo PRs fire BOTH
# `push` and `pull_request` for the same SHA; skip the pull_request leg since
# push already covers it. Forks still run via pull_request because pushes from
# forks don't fire here. Applied to lint / test / bench only — every other job
# already filters on `refs/heads/main` or `refs/tags/v*`.
jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Surfaces formatting (prettier) and code-quality (deno lint) failures fast,
  # independent of the slower test job.
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run lint:docs
      # Type-check bench files under Deno so Node-globals leaking into shared lib/
      # code (e.g. raw `Buffer` references without a node:buffer import) fails fast
      # in lint instead of only surfacing in the bench job.
      - run: deno check 'benches/**/*.ts'

  # ── Test ──────────────────────────────────────────────────────────────────────
  # Runs in parallel with lint. Test files run concurrently — safe because each
  # CLI invocation gets a unique --output dir and the port binder starts from
  # 1234 and auto-increments on EADDRINUSE to avoid collisions.
  # Matrix covers all three platforms so Chromium behaviour is verified on each OS.
  # macOS/Windows get extra time: Chrome startup and I/O are slower off Linux.
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.os == 'ubuntu-latest' && 15 || 25 }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      # Cross-run V8 compile cache. test/runner.ts already injects
      # NODE_COMPILE_CACHE=node_modules/.cache/qunitx/v8 into spawnTests env, which
      # gives within-run reuse across 30 test workers + their cli.ts spawns. This
      # step extends that to cross-run reuse: worker 1's parser pass + the first
      # cli.ts spawn become warm-from-previous-CI rather than cold. Restored AFTER
      # npm ci because npm ci deletes node_modules entirely. Key includes github.sha
      # so each run saves a fresh cache (capturing bytecode written this run);
      # restore-keys fall back to the latest matching prefix. V8 invalidates entries
      # by content hash + Node version, so stale source bytecode is silently ignored.
      - uses: actions/cache@v5
        with:
          path: node_modules/.cache/qunitx/v8
          key: ${{ runner.os }}-node24-v8cc-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node24-v8cc-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-node24-v8cc-
      # macOS: install playwright-core's chromium-headless-shell instead of using CHROME_BIN.
      # Google Chrome for Testing (ARM64) crashes immediately with playwright-core's mandatory
      # --enable-unsafe-swiftshader flag. chromium-headless-shell is purpose-built for headless
      # testing and handles this correctly. Pre-launch is skipped on macOS (chrome-prelaunch.ts).
      - run: node_modules/.bin/playwright-core install chromium-headless-shell
        if: runner.os == 'macOS'
      # Ubuntu only: wrap the test run with c8 to collect V8 coverage from all child
      # node processes (the CLI subprocesses spawned by tests). c8 sets NODE_V8_COVERAGE
      # so every `node cli.ts` invocation writes coverage data; c8 merges them and emits
      # coverage/lcov.info for Codecov. Running coverage here (instead of a separate job)
      # avoids re-running the full test suite a second time on a dedicated runner.
      - run: npx c8 --reporter=lcov --reporter=text --reporter=html npm test
        if: matrix.os == 'ubuntu-latest'
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - run: npm test
        if: matrix.os != 'ubuntu-latest'
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1
      # JUnit XMLs (one per phase: fast / watch-rerun / leak) are picked up by the
      # test-report.yml workflow_run trigger to render PR annotations + per-platform
      # check runs via dorny/test-reporter. Always-upload so failures get reported too.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-${{ matrix.os }}
          path: tmp/junit-*.xml
          retention-days: 3
          if-no-files-found: ignore

  # ── Bench ─────────────────────────────────────────────────────────────────────
  # Runs the full bench suite (esbuild, HTTP server, TAP display, e2e, daemon)
  # against the saved baseline in benches/results.json on every push and PR,
  # failing the job if any bench regresses past REGRESSION_THRESHOLD (default
  # 26%, with a 1µs absolute-delta floor — see scripts/check-benchmarks.ts).
  # Chrome is required because the e2e + daemon benches spawn `node cli.ts`.
  # If a bench becomes flaky on GHA's noisy shared runners, set
  # SKIP_BENCHMARK=<basename> in env to skip only that file, or =true to
  # skip the whole gate while you investigate.
  bench:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      - run: deno task bench:check
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0

  # ── Test (Deno binary) ────────────────────────────────────────────────────────
  # Builds dist/qunitx via `deno task build:binary` and runs the same 592-test
  # suite with QUNITX_BIN pointing at it; test/helpers/shell.ts swaps `node
  # cli.ts` for that binary at parse time. Goal: catch regressions in the
  # `deno compile` path AND surface flakes the Node lane misses (different GC,
  # different timer impl, different child_process compat). Allowed to be flaky:
  # NOT a `needs:` of pages or docker-nightly so a Deno-only failure cannot
  # block main-branch deploys.
  #
  # Coverage gap: six tests bypass `parseCommand` (they spawn process.execPath
  # with cli.ts literally — port-test.ts:160, watch-rerun-test.ts:832,
  # custom-html-test.ts:21+101, no-html-test.ts:120, plugins-test.ts:40), so
  # this lane exercises 586/592 against the binary. Migrating those is a
  # separate follow-up.
  test-deno:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    name: test-deno (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.os == 'ubuntu-latest' && 15 || 25 }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      # macOS: see the equivalent step in the `test` job above for why the
      # chromium-headless-shell install is required instead of using CHROME_BIN.
      - run: node_modules/.bin/playwright-core install chromium-headless-shell
        if: runner.os == 'macOS'
      - name: Build Deno binary + esbuild sidecar
        shell: bash
        run: |
          mkdir -p dist
          deno task build:binary
          # @esbuild/<pkg> layout differs by platform: POSIX ships under bin/,
          # Windows puts esbuild.exe at the package root (no bin/ dir). Mirror
          # the existing `build-binaries` job's matrix paths.
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   SRC=node_modules/@esbuild/linux-x64/bin/esbuild;    DST=dist/esbuild;;
            macOS-ARM64) SRC=node_modules/@esbuild/darwin-arm64/bin/esbuild; DST=dist/esbuild;;
            Windows-X64) SRC=node_modules/@esbuild/win32-x64/esbuild.exe;    DST=dist/esbuild.exe;;
            *) echo "Unsupported ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1;;
          esac
          cp "$SRC" "$DST"
      # Git Bash $(pwd) returns a POSIX-style path (/d/a/...) that Node.spawn
      # cannot pass to a .exe; pwd -W returns the Windows form (D:/a/...).
      - name: Run test suite against Deno binary
        if: runner.os != 'Windows'
        shell: bash
        run: QUNITX_BIN="$(pwd)/dist/qunitx" npm test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - name: Run test suite against Deno binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: QUNITX_BIN="$(pwd -W)/dist/qunitx.exe" npm test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-deno-${{ matrix.os }}
          path: tmp/junit-*.xml
          retention-days: 3
          if-no-files-found: ignore

  # ── Pages (main only) ─────────────────────────────────────────────────────────
  # Runs the CLI against the demo test file to capture live TAP output, copies
  # the composite demo GIF, generates API docs (deno doc --html), embeds the
  # coverage report, then deploys the full site to GitHub Pages.
  # Concurrency guard cancels any stale in-flight deployment.
  pages:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      - name: Capture demo output
        run: node cli.ts docs/demo-math-test.js --output=tmp/pages-demo > demo-output.txt 2>&1 || true
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - name: Generate API docs
        run: npm run docs && mkdir -p _site && cp -r docs/lib _site/docs
      - uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: _site/coverage
      - name: Assemble site
        env:
          REPO: ${{ github.repository }}
        run: |
          node --input-type=module - << 'NODESCRIPT'
          import fs from 'node:fs/promises';
          const repo = process.env.REPO;
          const [raw, apiIdx, readmePage] = await Promise.all([
            fs.readFile('demo-output.txt', 'utf8'),
            fs.readFile('_site/docs/index.html', 'utf8'),
            fs.readFile('_site/docs/README.md/index.html', 'utf8'),
          ]);
          const escaped = raw.trim().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          // Inject README content into the empty /docs/ homepage (deno doc leaves <main> empty on the root index)
          const apiMain = readmePage.match(/<main>[\s\S]*?<\/main>/)[0]
            .replace(/src="docs\/demo\.gif"/g, 'src="../demo.gif"');
          await fs.mkdir('_site', { recursive: true });
          await Promise.all([
            fs.copyFile('docs/demo.gif', '_site/demo.gif').catch(() => {}),
            fs.writeFile('_site/docs/index.html', apiIdx.replace('<main></main>', apiMain)),
            fs.writeFile('_site/.nojekyll', ''),
            fs.writeFile('_site/index.html', `<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>qunitx-cli</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; }
              body { display: flex; flex-direction: column; min-height: 100vh; }
              header { flex-shrink: 0; display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: #161b22; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
              header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
              header a { font-size: 13px; color: #8b949e; text-decoration: none; }
              header a:hover { color: #e6edf3; }
              main { flex: 1; padding: 32px 24px; overflow: auto; }
              h2 { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
              img { max-width: 100%; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 32px; }
              pre { font-family: ui-monospace, 'JetBrains Mono', 'Fira Code', monospace; font-size: clamp(12px, 2vw, 15px); line-height: 1.6; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
              .prompt { color: #6e7681; user-select: none; }
              .cmd { color: #79c0ff; }
            </style>
          </head>
          <body>
            <header>
              <h1>qunitx-cli</h1>
              <a href="https://github.com/${repo}">source</a>
              <a href="https://npmjs.com/package/qunitx-cli">npm</a>
              <a href="https://ghcr.io/v2/${repo}/tags/list">docker</a>
              <a href="docs/">api docs</a>
              <a href="coverage/">coverage</a>
            </header>
            <main>
              <img src="demo.gif" alt="qunitx-cli demo">
              <h2>Live output</h2>
              <pre><span class="prompt">$ </span><span class="cmd">npx qunitx docs/demo-math-test.js</span>
          ${escaped}</pre>
            </main>
          </body>
          </html>`),
          ]);
          NODESCRIPT
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v5

  # ── Docker nightly ─────────────────────────────────────────────────────────────
  # Builds and pushes a `nightly` image to GHCR on every successful main-branch
  # push. PRs only build (no push) so the image cache stays warm for main.
  docker-nightly:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release consumer test (tags only) ─────────────────────────────────────────
  # Packs the built artefact, installs it into a throwaway consumer directory,
  # and runs the test suite with QUNITX_BIN pointing at the installed binary —
  # catching packaging bugs that source tests cannot see.
  # Mirrors browser-compat.yml: chromium runs the full suite, firefox/webkit
  # run only the browser-specific subset (test:browser) at concurrency=1.
  release-consumer-test:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    name: Release consumer test · ${{ matrix.os }} / ${{ matrix.browser }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            browser: chromium
            test_script: test
          - os: ubuntu-latest
            browser: firefox
            test_script: test:browser
          - os: ubuntu-latest
            browser: webkit
            test_script: test:browser
          - os: macos-latest
            browser: firefox
            test_script: test:browser
          - os: macos-latest
            browser: webkit
            test_script: test:browser
          - os: windows-latest
            browser: firefox
            test_script: test:browser
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: browser-actions/setup-chrome@v2
        if: matrix.browser == 'chromium'
        id: setup-chrome

      - run: npm ci

      - name: Get Playwright version
        if: matrix.browser != 'chromium'
        id: pw-version
        run: echo "version=$(node -p "require('playwright-core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser (${{ matrix.browser }})
        if: matrix.browser != 'chromium'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ matrix.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: matrix.browser != 'chromium' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (${{ matrix.browser }})
        if: matrix.browser != 'chromium' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install-deps ${{ matrix.browser }}

      - run: bash scripts/test-release.sh
        shell: bash
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          QUNITX_BROWSER: ${{ matrix.browser }}
          TEST_SCRIPT: ${{ matrix.test_script }}
          FORCE_COLOR: 0

  # ── Node.js SEA binaries (tags only) ──────────────────────────────────────────
  # Builds a standalone native binary per platform using Node.js Single
  # Executable Applications (node --experimental-sea-config, Node ≥ 22).
  #
  # How it works:
  #   1. esbuild bundles cli.ts + all deps into one CJS file (esbuild strips types natively).
  #      A small preamble is prepended: at startup it sets ESBUILD_BINARY_PATH
  #      to the `esbuild` binary sitting next to the SEA executable, so the
  #      bundled esbuild JS can find and spawn its native helper.
  #   2. Node injects that bundle as a blob into a copy of itself.
  #   3. The tarball ships: `qunitx` (SEA) + `esbuild` (native binary).
  #      Users put both in the same directory and add it to PATH.
  #
  # Chrome is not bundled — users supply it via CHROME_BIN (same as today).
  build-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    name: Build binary · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            esbuild_bin: node_modules/@esbuild/linux-x64/bin/esbuild
          - os: macos-latest
            target: macos-arm64
            esbuild_bin: node_modules/@esbuild/darwin-arm64/bin/esbuild
          - os: windows-latest
            target: windows-x64
            esbuild_bin: node_modules/@esbuild/win32-x64/esbuild.exe

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Bundle the entire CLI (including esbuild's JS) into a single CJS file.
      # fsevents is the only optional native addon — mark it external so esbuild
      # skips it cleanly (chokidar falls back to polling without it).
      # The banner preamble runs first and sets ESBUILD_BINARY_PATH so the
      # bundled esbuild JS finds the native binary next to the executable.
      - name: Bundle CLI to CJS
        shell: bash
        run: |
          PREAMBLE=';(function(){if(!process.env.ESBUILD_BINARY_PATH){var path=require("path"),fs=require("fs");["esbuild","esbuild.exe"].forEach(function(n){var p=path.join(path.dirname(process.execPath),n);try{fs.accessSync(p,fs.constants.X_OK);process.env.ESBUILD_BINARY_PATH=p;}catch(_){}});}})();'
          npx esbuild cli.ts \
            --bundle \
            --platform=node \
            --format=cjs \
            --banner:js="$PREAMBLE" \
            --outfile=sea-entry.cjs \
            --external:fsevents \
            --external:typescript \
            --external:chromium-bidi \
            --external:playwright-core \
            --log-level=warning \
            --log-override:empty-import-meta=silent \
            --log-override:require-resolve-not-external=silent

      - name: Create SEA blob
        shell: bash
        run: |
          node --input-type=commonjs -e "
          require('fs').writeFileSync('sea-config.json', JSON.stringify({
            main: 'sea-entry.cjs',
            output: 'sea.blob',
            disableExperimentalSEAWarning: true,
            useCodeCache: true,
            assets: {
              'setup/tests.hbs': 'templates/setup/tests.hbs',
              'setup/tsconfig.json': 'templates/setup/tsconfig.json',
              'test.js': 'templates/test.js'
            }
          }, null, 2));"
          node --experimental-sea-config sea-config.json

      - name: Inject blob into Node binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "$(node --input-type=commonjs -e 'process.stdout.write(process.execPath)')" qunitx
          codesign --remove-signature qunitx 2>/dev/null || true
          if [ "$(uname)" = "Darwin" ]; then
            npx --yes postject qunitx NODE_SEA_BLOB sea.blob \
              --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
              --macho-segment-name NODE_SEA
          else
            npx --yes postject qunitx NODE_SEA_BLOB sea.blob \
              --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2
          fi
          codesign --sign - qunitx 2>/dev/null || true
          chmod +x qunitx

      - name: Inject blob into Node binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodePath = node --input-type=commonjs -e "process.stdout.write(process.execPath)"
          Copy-Item $nodePath qunitx.exe
          npx --yes postject qunitx.exe NODE_SEA_BLOB sea.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/qunitx-${{ matrix.target }}
          cp qunitx dist/qunitx-${{ matrix.target }}/qunitx
          cp ${{ matrix.esbuild_bin }} dist/qunitx-${{ matrix.target }}/esbuild
          chmod +x dist/qunitx-${{ matrix.target }}/esbuild
          tar czf qunitx-${{ matrix.target }}.tar.gz -C dist qunitx-${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/qunitx-${{ matrix.target }}
          Copy-Item qunitx.exe dist/qunitx-${{ matrix.target }}/qunitx.exe
          Copy-Item ${{ matrix.esbuild_bin }} dist/qunitx-${{ matrix.target }}/esbuild.exe
          Compress-Archive -Path "dist/qunitx-${{ matrix.target }}" `
            -DestinationPath "qunitx-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: qunitx-${{ matrix.target }}
          path: qunitx-${{ matrix.target }}.*

  # ── Deno-compiled binaries (tags only) ────────────────────────────────────────
  # Parallel to build-binaries (which uses Node SEA): produces a self-contained
  # binary built with `deno compile` plus the matching @esbuild sidecar, packaged
  # as `qunitx-deno-<target>.tar.gz` (or .zip on Windows). Lives alongside the SEA
  # artifacts on the GitHub release so users can pick the binary that matches
  # their preferred runtime without extra steps.
  #
  # Why per-platform native runners (vs deno compile --target cross-compile):
  #   - We need the matching `@esbuild/<target>` sidecar; only the host's native
  #     package is in node_modules without extra installs.
  #   - Each native runner gets a free smoke (binary + sidecar are cp'd on the
  #     same host they were built for; staleness/path mismatches surface here).
  build-deno-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    name: Build deno binary · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            esbuild_src: node_modules/@esbuild/linux-x64/bin/esbuild
            esbuild_dst: esbuild
          - os: macos-latest
            target: macos-arm64
            esbuild_src: node_modules/@esbuild/darwin-arm64/bin/esbuild
            esbuild_dst: esbuild
          - os: windows-latest
            target: windows-x64
            esbuild_src: node_modules/@esbuild/win32-x64/esbuild.exe
            esbuild_dst: esbuild.exe

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci

      - name: Build Deno binary + esbuild sidecar
        shell: bash
        run: |
          mkdir -p dist/qunitx-deno-${{ matrix.target }}
          deno task build:binary
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/qunitx.exe dist/qunitx-deno-${{ matrix.target }}/qunitx.exe
          else
            mv dist/qunitx     dist/qunitx-deno-${{ matrix.target }}/qunitx
            chmod +x dist/qunitx-deno-${{ matrix.target }}/qunitx
          fi
          cp "${{ matrix.esbuild_src }}" \
             "dist/qunitx-deno-${{ matrix.target }}/${{ matrix.esbuild_dst }}"
          chmod +x "dist/qunitx-deno-${{ matrix.target }}/${{ matrix.esbuild_dst }}" 2>/dev/null || true

      - name: Smoke test
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="$(pwd)/dist/qunitx-deno-${{ matrix.target }}/qunitx"
          "$BIN" --version
          "$BIN" daemon 2>&1 | grep -q "Usage: qunitx daemon"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN="$(pwd -W)/dist/qunitx-deno-${{ matrix.target }}/qunitx.exe"
          "$BIN" --version
          "$BIN" daemon 2>&1 | grep -q "Usage: qunitx daemon"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: tar czf qunitx-deno-${{ matrix.target }}.tar.gz -C dist qunitx-deno-${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/qunitx-deno-${{ matrix.target }}" `
            -DestinationPath "qunitx-deno-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: qunitx-deno-${{ matrix.target }}
          path: qunitx-deno-${{ matrix.target }}.*

  # ── GitHub release (tags only) ────────────────────────────────────────────────
  # Creates the release entry from the matching CHANGELOG.md section (so the
  # body matches the rich changelog `make release` already committed) and
  # uploads all platform binaries with SHA-256 checksums.
  #
  # Intentionally NOT gated on release-consumer-test: by the time this runs,
  # `make release` has already published to npm, so blocking the GitHub
  # release on a flaky consumer test causes drift (npm has it, GH doesn't).
  # release-consumer-test still runs in parallel and surfaces failures in CI
  # status; release-reconcile.yml is the weekly backstop for any other
  # publish failures (GH API outages, runner death, etc.).
  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-binaries, build-deno-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      # download-artifact's `pattern: qunitx-*` matches both `qunitx-<target>`
      # (SEA tarballs) and `qunitx-deno-<target>` (Deno tarballs); merge-multiple
      # collapses them into one artifacts/ dir for publish-release to upload.
      - uses: actions/download-artifact@v8
        with:
          pattern: qunitx-*
          merge-multiple: true
          path: artifacts
      - uses: ./.github/actions/publish-release
        with:
          tag: ${{ github.ref_name }}
          artifacts_dir: artifacts
          github_token: ${{ github.token }}

  # ── Docker versioned image (tags only) ────────────────────────────────────────
  publish-docker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
