name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Surfaces formatting (prettier) and code-quality (deno lint) failures fast,
  # independent of the slower test job.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run lint:docs

  # ── Test ──────────────────────────────────────────────────────────────────────
  # Runs in parallel with lint. Test files run concurrently — safe because each
  # CLI invocation gets a unique --output dir and the port resolver uses
  # server.listen(0) to avoid collisions.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      - run: npm test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0

  # ── Bench ─────────────────────────────────────────────────────────────────────
  # Runs fast microbenchmarks (esbuild bundling, HTTP server, TAP display) on
  # every push and PR. No Chrome required. Results are informational — the
  # regression gate lives in `make release` (bench-check) which runs locally
  # where the saved baseline in benches/results.json is available.
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: deno bench --allow-all benches/esbuild.bench.ts benches/server.bench.ts benches/tap.bench.ts

  # ── Coverage ──────────────────────────────────────────────────────────────────
  # Runs in parallel with test. c8 is the Node.js equivalent of `deno coverage`:
  # both use V8's built-in coverage mechanism. c8 is required here because
  # qunitx-cli tests launch headless Chrome via playwright — the code runs inside
  # child `node cli.js` processes that can't execute under Deno.
  # c8 sets NODE_V8_COVERAGE so all child processes write coverage data;
  # it merges them and emits coverage/lcov.info for Codecov.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      - run: npx c8 --reporter=lcov --reporter=text --reporter=html npm test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

  # ── Pages (main only) ─────────────────────────────────────────────────────────
  # Runs the CLI against the demo test file to capture live TAP output, copies
  # the composite demo GIF, generates API docs (deno doc --html), embeds the
  # coverage report, then deploys the full site to GitHub Pages.
  # Concurrency guard cancels any stale in-flight deployment.
  pages:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test, coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      - run: npm ci
      - name: Capture demo output
        run: node cli.js docs/demo-math-test.js --output=tmp/pages-demo > demo-output.txt 2>&1 || true
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - name: Generate API docs
        run: npm run docs && mkdir -p _site && cp -r docs/lib _site/api
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: _site/coverage
      - name: Assemble site
        env:
          REPO: ${{ github.repository }}
        run: |
          node --input-type=module - << 'NODESCRIPT'
          import fs from 'node:fs/promises';
          const repo = process.env.REPO;
          const [raw, apiIdx, readmePage] = await Promise.all([
            fs.readFile('demo-output.txt', 'utf8'),
            fs.readFile('_site/api/index.html', 'utf8'),
            fs.readFile('_site/api/README.md/index.html', 'utf8'),
          ]);
          const escaped = raw.trim().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          // Inject README content into the empty /api/ homepage (deno doc leaves <main> empty on the root index)
          const apiMain = readmePage.match(/<main>[\s\S]*?<\/main>/)[0]
            .replace(/src="docs\/demo\.gif"/g, 'src="../demo.gif"');
          await fs.mkdir('_site', { recursive: true });
          await Promise.all([
            fs.copyFile('docs/demo.gif', '_site/demo.gif').catch(() => {}),
            fs.writeFile('_site/api/index.html', apiIdx.replace('<main></main>', apiMain)),
            fs.writeFile('_site/.nojekyll', ''),
            fs.writeFile('_site/index.html', `<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>qunitx-cli</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; }
              body { display: flex; flex-direction: column; min-height: 100vh; }
              header { flex-shrink: 0; display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: #161b22; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
              header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
              header a { font-size: 13px; color: #8b949e; text-decoration: none; }
              header a:hover { color: #e6edf3; }
              main { flex: 1; padding: 32px 24px; overflow: auto; }
              h2 { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
              img { max-width: 100%; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 32px; }
              pre { font-family: ui-monospace, 'JetBrains Mono', 'Fira Code', monospace; font-size: clamp(12px, 2vw, 15px); line-height: 1.6; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
              .prompt { color: #6e7681; user-select: none; }
              .cmd { color: #79c0ff; }
            </style>
          </head>
          <body>
            <header>
              <h1>qunitx-cli</h1>
              <a href="https://github.com/${repo}">source</a>
              <a href="https://npmjs.com/package/qunitx-cli">npm</a>
              <a href="https://ghcr.io/v2/${repo}/tags/list">docker</a>
              <a href="api/">api docs</a>
              <a href="coverage/">coverage</a>
            </header>
            <main>
              <img src="demo.gif" alt="qunitx-cli demo">
              <h2>Live output</h2>
              <pre><span class="prompt">$ </span><span class="cmd">npx qunitx docs/demo-math-test.js</span>
          ${escaped}</pre>
            </main>
          </body>
          </html>`),
          ]);
          NODESCRIPT
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4

  # ── Docker nightly ─────────────────────────────────────────────────────────────
  # Builds and pushes a `nightly` image to GHCR on every successful main-branch
  # push. PRs only build (no push) so the image cache stays warm for main.
  docker-nightly:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
