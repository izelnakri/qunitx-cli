name: Browser Compatibility

# Runs only the browser-specific tests (test/flags/ + test/inputs/) against Firefox
# and WebKit. Unit tests (TAP, parse-cli-flags, servers, etc.) are browser-agnostic
# and are already covered by the main CI test job on Chromium — no need to repeat them.
#
# Triggers:
#   - Every push and PR (same as ci.yml) so regressions are caught immediately
#   - Weekly on Monday to detect upstream Playwright browser changes

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual runs

permissions:
  contents: read

jobs:
  browser-compat:
    name: ${{ matrix.os }} / ${{ matrix.browser }}
    # Skip duplicate pull_request events (push already covers same-repo branches; forks still run).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        browser: [firefox, webkit]
        exclude:
          - os: windows-latest
            browser: webkit

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: pw-version
        # shell: bash is mandatory, PowerShell can't parse `$(...)` or `"$GITHUB_OUTPUT"`
        shell: bash
        run: echo "version=$(node -p "require('playwright-core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser (${{ matrix.browser }})
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ matrix.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install-deps ${{ matrix.browser }}

      - name: Run browser tests (${{ matrix.browser }})
        run: npm run test:browser
        env:
          QUNITX_BROWSER: ${{ matrix.browser }}
          FORCE_COLOR: 0

  # Same matrix as `browser-compat`, but routed entirely through Deno:
  #   1. `test/runner.ts` itself runs under `deno run -A` (script `test:browser:deno`).
  #   2. It spawns `deno test --allow-all --no-check --parallel --junit-path=…` workers
  #      for each phase (see `test/runner.ts`'s `IS_DENO` branch in spawnTests).
  #   3. Every CLI invocation inside those tests goes through `QUNITX_BIN`, which
  #      points at the deno-compiled `dist/qunitx[.exe]`.
  # Net: three Deno surfaces under test simultaneously (test runner / test worker /
  # CLI binary). That's the cross-runtime coverage this lane exists to provide —
  # any Deno-specific regression (node:fs.watch gaps, child_process compat,
  # node:timers shape) surfaces here rather than slipping into a release.
  #
  # windows-latest / firefox is excluded — Playwright's Firefox launch on Windows
  # goes through playwright-core's processLauncher (chromium uses our CDP pre-
  # launch path instead, webkit doesn't ship on Windows), and Deno's `deno
  # compile` binary's child_process shim has known gaps with the spawn options
  # Playwright passes. Observed symptoms: intermittent INVALID_HANDLE (os error
  # 6) on browser launch AND test fixtures running multiple times because the
  # page lifecycle behaves differently under that stack. The real fix is
  # upstream in Deno's Windows child_process compat (denoland/deno#35994);
  # re-enable once that lands.
  # Firefox is still tested on ubuntu+macos under Deno & on Windows under Node
  # (`browser-compat` job above).
  browser-compat-deno:
    name: deno · ${{ matrix.os }} / ${{ matrix.browser }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        browser: [firefox, webkit]
        exclude:
          - os: windows-latest
            browser: webkit
          - os: windows-latest
            browser: firefox

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci

      - name: Get Playwright version
        id: pw-version
        # shell: bash is mandatory, PowerShell can't parse `$(...)` or `"$GITHUB_OUTPUT"`. Without it,
        # version stays, empty on Windows and `npx playwright@` resolves to whatever happens to be latest
        shell: bash
        run: echo "version=$(node -p "require('playwright-core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser (${{ matrix.browser }})
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ matrix.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install-deps ${{ matrix.browser }}

      - name: Build Deno binary + esbuild sidecar
        shell: bash
        run: |
          mkdir -p dist
          deno task build:binary
          # Windows ships @esbuild/<pkg>/esbuild.exe at the package root, not under bin/.
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   SRC=node_modules/@esbuild/linux-x64/bin/esbuild;    DST=dist/esbuild;;
            macOS-ARM64) SRC=node_modules/@esbuild/darwin-arm64/bin/esbuild; DST=dist/esbuild;;
            Windows-X64) SRC=node_modules/@esbuild/win32-x64/esbuild.exe;    DST=dist/esbuild.exe;;
            *) echo "Unsupported ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1;;
          esac
          cp "$SRC" "$DST"

      - name: Run browser tests under Deno runner + binary (${{ matrix.browser }})
        if: runner.os != 'Windows'
        shell: bash
        run: QUNITX_BIN="$(pwd)/dist/qunitx" npm run test:browser:deno
        env:
          QUNITX_BROWSER: ${{ matrix.browser }}
          FORCE_COLOR: 0

      - name: Run browser tests under Deno runner + binary (Windows, ${{ matrix.browser }})
        if: runner.os == 'Windows'
        shell: bash
        run: QUNITX_BIN="$(pwd -W)/dist/qunitx.exe" npm run test:browser:deno
        env:
          QUNITX_BROWSER: ${{ matrix.browser }}
          FORCE_COLOR: 0
