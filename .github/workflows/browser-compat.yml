name: Browser Compatibility

# Runs only the browser-specific tests (test/flags/ + test/inputs/) against Firefox
# and WebKit. Unit tests (TAP, parse-cli-flags, servers, etc.) are browser-agnostic
# and are already covered by the main CI test job on Chromium — no need to repeat them.
#
# Triggers:
#   - Every push and PR (same as ci.yml) so regressions are caught immediately
#   - Weekly on Monday to detect upstream Playwright browser changes

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual runs

permissions:
  contents: read

jobs:
  browser-compat:
    name: ${{ matrix.os }} / ${{ matrix.browser }}
    # Skip duplicate pull_request events (push already covers same-repo branches; forks still run).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        browser: [firefox, webkit]
        exclude:
          # WebKit/Safari does not exist on Windows for end-users — skip it.
          - os: windows-latest
            browser: webkit

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('playwright-core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser (${{ matrix.browser }})
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ matrix.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install-deps ${{ matrix.browser }}

      - name: Run browser tests (${{ matrix.browser }})
        run: npm run test:browser
        env:
          QUNITX_BROWSER: ${{ matrix.browser }}
          FORCE_COLOR: 0

  # Same matrix as `browser-compat` but routed through the deno-compiled binary.
  # Mirrors the test-deno job in ci.yml: build dist/qunitx via `deno task
  # build:binary`, copy the local @esbuild sidecar next to it, point QUNITX_BIN
  # at the binary, run only the browser-specific subset (test:browser). Catches
  # firefox/webkit regressions specific to the Deno path (different child_process
  # compat, different module-load ordering) without re-running the full unit suite.
  browser-compat-deno:
    name: deno · ${{ matrix.os }} / ${{ matrix.browser }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        browser: [firefox, webkit]
        exclude:
          - os: windows-latest
            browser: webkit

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('playwright-core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser (${{ matrix.browser }})
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ matrix.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@${{ steps.pw-version.outputs.version }} install-deps ${{ matrix.browser }}

      - name: Build Deno binary + esbuild sidecar
        shell: bash
        run: |
          mkdir -p dist
          deno task build:binary
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   PKG=linux-x64;    BIN=esbuild;;
            macOS-ARM64) PKG=darwin-arm64; BIN=esbuild;;
            Windows-X64) PKG=win32-x64;    BIN=esbuild.exe;;
            *) echo "Unsupported ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1;;
          esac
          cp "node_modules/@esbuild/$PKG/bin/$BIN" "dist/$BIN"

      - name: Run browser tests against Deno binary (${{ matrix.browser }})
        if: runner.os != 'Windows'
        shell: bash
        run: QUNITX_BIN="$(pwd)/dist/qunitx" npm run test:browser
        env:
          QUNITX_BROWSER: ${{ matrix.browser }}
          FORCE_COLOR: 0

      - name: Run browser tests against Deno binary (Windows, ${{ matrix.browser }})
        if: runner.os == 'Windows'
        shell: bash
        run: QUNITX_BIN="$(pwd -W)/dist/qunitx.exe" npm run test:browser
        env:
          QUNITX_BROWSER: ${{ matrix.browser }}
          FORCE_COLOR: 0
