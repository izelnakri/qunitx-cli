version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      # upload-artifact and download-artifact share an artifact API and must
      # be updated together to stay compatible.
      artifact-actions:
        patterns:
          - 'actions/upload-artifact'
          - 'actions/download-artifact'
      docker-actions:
        patterns:
          - 'docker/*'
